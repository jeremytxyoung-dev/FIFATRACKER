<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Tracker + Betting</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: #0a0a1a;
  color: #f0f0f0;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 12px 0;
  border-bottom: 3px solid #e94560;
  position: sticky;
  top: 0;
  z-index: 1000;
}
.header-content {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo h1 { font-size: 1.3rem; font-weight: 800; }
.logo span { color: #e94560; }
.live-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.75rem; color: #ff4444;
  background: rgba(255,68,68,0.1);
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,68,68,0.3);
}
.live-dot {
  width: 8px; height: 8px; background: #ff4444;
  border-radius: 50%; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
.nav-tabs { display: flex; gap: 5px; flex-wrap: wrap; }
.nav-tab {
  padding: 7px 14px; border-radius: 18px;
  background: rgba(255,255,255,0.05); color: #a0a0a0;
  cursor: pointer; transition: all 0.2s; font-weight: 500;
  font-size: 0.8rem; border: none;
}
.nav-tab:hover { background: rgba(233,69,96,0.2); color: #fff; }
.nav-tab.active { background: #e94560; color: #fff; }
.refresh-btn {
  padding: 6px 12px; border-radius: 14px;
  background: rgba(76,175,80,0.15); color: #4caf50;
  border: 1px solid rgba(76,175,80,0.3);
  cursor: pointer; font-size: 0.75rem; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.refresh-btn:hover { background: rgba(76,175,80,0.25); }
.refresh-btn.spinning .refresh-icon { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.section-title {
  font-size: 1.3rem; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

/* Match Cards */
.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 14px;
}
.match-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 16px;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.match-card:hover { border-color: rgba(233,69,96,0.3); transform: translateY(-1px); }
.match-card.live { border-left: 3px solid #ff4444; }
.match-card.finished { border-left: 3px solid #4caf50; }
.match-card.upcoming { border-left: 3px solid #4a90d9; }
.match-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; font-size: 0.75rem; color: #a0a0a0;
}
.match-status {
  padding: 3px 10px; border-radius: 12px;
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
}
.match-status.live { background: rgba(255,68,68,0.15); color: #ff4444; }
.match-status.finished { background: rgba(76,175,80,0.15); color: #4caf50; }
.match-status.upcoming { background: rgba(74,144,217,0.15); color: #4a90d9; }
.match-teams {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.team { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
.team-flag { font-size: 1.8rem; }
.team-name { font-weight: 600; font-size: 0.85rem; text-align: center; }
.score-box {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  min-width: 60px;
}
.score { font-size: 1.8rem; font-weight: 800; color: #ffd700; }
.match-time { font-size: 0.75rem; color: #a0a0a0; }
.match-venue {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 0.75rem; color: #a0a0a0;
}

/* Expandable sections */
.expand-section {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: none;
}
.expand-section.show { display: block; }
.section-toggle {
  display: flex; gap: 8px; margin-top: 10px;
}
.toggle-btn {
  flex: 1; padding: 6px; border-radius: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #a0a0a0; cursor: pointer; font-size: 0.7rem;
  text-align: center; font-weight: 500;
}
.toggle-btn:hover { background: rgba(255,255,255,0.08); color: #fff; }
.toggle-btn.active { background: rgba(233,69,96,0.2); border-color: #e94560; color: #fff; }

/* Scorers */
.scorers { font-size: 0.78rem; color: #ccc; margin-top: 8px; }
.scorer-row { padding: 2px 0; }

/* Betting */
.betting-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.bet-col {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 10px;
  border: 1px solid rgba(255,255,255,0.05);
}
.bet-col-title {
  font-size: 0.65rem; color: #a0a0a0; text-transform: uppercase;
  letter-spacing: 1px; text-align: center; margin-bottom: 8px;
  font-weight: 600;
}
.bet-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 8px; margin-bottom: 4px;
  background: rgba(255,255,255,0.04);
  border-radius: 6px; cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  font-size: 0.78rem;
}
.bet-row:hover { border-color: #e94560; background: rgba(233,69,96,0.08); }
.bet-row.selected {
  border-color: #ffd700; background: rgba(255,215,0,0.08);
}
.bet-label { font-weight: 500; }
.bet-odds { font-weight: 700; color: #4caf50; font-family: monospace; }
.bet-odds.negative { color: #ff6b6b; }

/* Bet Slip */
.bet-slip {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, #1a1a2e, #0f0f23);
  border-top: 2px solid #e94560;
  padding: 12px 20px;
  z-index: 999;
  transform: translateY(100%);
  transition: transform 0.3s;
  max-height: 50vh; overflow-y: auto;
}
.bet-slip.open { transform: translateY(0); }
.bet-slip-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.bet-slip-title { font-weight: 700; font-size: 1rem; }
.bet-slip-count {
  background: #e94560; color: #fff; padding: 2px 8px;
  border-radius: 10px; font-size: 0.75rem; font-weight: 700;
}
.bet-slip-close {
  background: none; border: none; color: #a0a0a0;
  font-size: 1.2rem; cursor: pointer;
}
.bet-slip-items { margin-bottom: 10px; }
.bet-slip-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px; background: rgba(255,255,255,0.04);
  border-radius: 8px; margin-bottom: 6px; font-size: 0.8rem;
}
.bet-slip-remove {
  color: #ff4444; cursor: pointer; font-size: 1rem;
  background: none; border: none;
}
.bet-slip-footer {
  display: flex; gap: 10px; align-items: center;
}
.bet-stake-input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff; padding: 8px 12px;
  border-radius: 8px; width: 100px;
  font-size: 0.9rem;
}
.bet-potential {
  flex: 1; text-align: right; font-size: 0.85rem;
}
.bet-potential-amount { color: #ffd700; font-weight: 700; font-size: 1rem; }
.place-bet-btn {
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  color: #fff; border: none; padding: 10px 24px;
  border-radius: 10px; font-weight: 700; cursor: pointer;
  font-size: 0.85rem;
}
.place-bet-btn:hover { opacity: 0.9; }
.bet-slip-toggle {
  position: fixed; bottom: 20px; right: 20px;
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  color: #fff; border: none; width: 56px; height: 56px;
  border-radius: 50%; font-size: 1.4rem;
  cursor: pointer; z-index: 998;
  box-shadow: 0 4px 15px rgba(233,69,96,0.4);
  display: flex; align-items: center; justify-content: center;
}
.bet-slip-toggle:hover { transform: scale(1.05); }

/* Filters */
.filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: #a0a0a0;
  cursor: pointer; font-size: 0.75rem;
}
.filter-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

/* Groups */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.group-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; overflow: hidden;
}
.group-header {
  background: linear-gradient(135deg, #e94560, #ff6b6b);
  padding: 10px 14px; font-weight: 700; font-size: 0.95rem;
}
.group-table { width: 100%; border-collapse: collapse; }
.group-table th {
  padding: 8px 6px; text-align: center; font-size: 0.65rem;
  color: #a0a0a0; text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.group-table td {
  padding: 8px 6px; text-align: center; font-size: 0.8rem;
  border-bottom: 1px solid rgba(255,255,255,0.02);
}
.group-table .team-cell {
  display: flex; align-items: center; gap: 6px; text-align: left;
}
.group-table .points { font-weight: 700; color: #ffd700; }
.group-table tr.qualify { background: rgba(76,175,80,0.04); }
.group-table tr.qualify td:first-child { border-left: 2px solid #4caf50; }

/* Bracket */
.bracket-wrap { overflow-x: auto; padding: 10px 0; }
.bracket {
  display: flex; gap: 24px; min-width: 900px; justify-content: center;
}
.bracket-round { display: flex; flex-direction: column; justify-content: space-around; gap: 12px; }
.bracket-round-title {
  text-align: center; font-size: 0.7rem; color: #a0a0a0;
  text-transform: uppercase; letter-spacing: 1px;
}
.bracket-match {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px; padding: 10px 12px; min-width: 170px;
}
.bracket-team { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.8rem; }
.bracket-date { font-size: 0.65rem; color: #a0a0a0; margin-top: 5px; text-align: center; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 5px; }
.bracket-final { border: 2px solid #ffd700; background: rgba(255,215,0,0.04); }

/* Standings / Scorers */
.standings-table { width: 100%; background: rgba(255,255,255,0.04); border-radius: 14px; overflow: hidden; }
.standings-table th { background: #16213e; padding: 10px; text-align: center; font-size: 0.7rem; color: #a0a0a0; text-transform: uppercase; }
.standings-table td { padding: 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.85rem; }
.standings-table .rank { font-weight: 800; }
.standings-table .rank-1 { color: #ffd700; }
.standings-table .rank-2 { color: #c0c0c0; }
.standings-table .rank-3 { color: #cd7f32; }
.player-cell { display: flex; align-items: center; gap: 8px; }
.player-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #ff6b6b); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
.stat-val { font-weight: 700; color: #e94560; }

/* Venues */
.venues-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.venue-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; overflow: hidden;
}
.venue-img { height: 140px; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
.venue-info { padding: 14px; }
.venue-name { font-weight: 700; margin-bottom: 3px; font-size: 0.95rem; }
.venue-city { font-size: 0.8rem; color: #a0a0a0; margin-bottom: 6px; }
.venue-details { display: flex; gap: 10px; font-size: 0.75rem; color: #a0a0a0; }

/* News */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}
.news-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; overflow: hidden;
}
.news-img { height: 150px; background: linear-gradient(135deg, #16213e, #1a1a2e); display: flex; align-items: center; justify-content: center; font-size: 2rem; }
.news-body { padding: 14px; }
.news-tag { display: inline-block; padding: 3px 8px; background: #e94560; color: #fff; border-radius: 12px; font-size: 0.65rem; font-weight: 600; margin-bottom: 6px; }
.news-title { font-weight: 700; margin-bottom: 6px; font-size: 0.95rem; }
.news-excerpt { font-size: 0.8rem; color: #a0a0a0; line-height: 1.4; margin-bottom: 8px; }
.news-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: #a0a0a0; }

/* Empty */
.empty { text-align: center; padding: 40px; color: #a0a0a0; font-size: 0.9rem; }

/* Status bar */
.status-bar {
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 8px 20px;
  font-size: 0.75rem;
  color: #a0a0a0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.status-bar .last-update { color: #4caf50; }
.status-bar .api-status { display: flex; align-items: center; gap: 5px; }
.status-bar .api-status.offline { color: #ff6b6b; }
.status-bar .api-status.online { color: #4caf50; }

/* Toast */
.toast {
  position: fixed; top: 80px; right: 20px;
  background: #16213e; border: 1px solid rgba(255,255,255,0.1);
  padding: 12px 16px; border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 1001; font-size: 0.85rem;
  transform: translateX(150%); transition: transform 0.3s;
  max-width: 300px;
}
.toast.show { transform: translateX(0); }
.toast.success { border-left: 3px solid #4caf50; }
.toast.error { border-left: 3px solid #ff4444; }

@media (max-width: 768px) {
  .header-content { flex-direction: column; align-items: stretch; }
  .matches-grid { grid-template-columns: 1fr; }
  .groups-grid { grid-template-columns: 1fr; }
  .bracket { min-width: 700px; }
  .betting-grid { grid-template-columns: 1fr; }
  .bet-slip { padding: 10px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <h1>World Cup <span>2026</span></h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="live-indicator" id="live-indicator" style="display:none;">
        <div class="live-dot"></div>
        <span>LIVE DATA</span>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="refreshData()">
        <span class="refresh-icon">🔄</span> Refresh
      </button>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="dashboard">📊 Dashboard</button>
        <button class="nav-tab" data-tab="matches">⚽ Matches</button>
        <button class="nav-tab" data-tab="groups">🏆 Groups</button>
        <button class="nav-tab" data-tab="bracket">🗳️ Bracket</button>
        <button class="nav-tab" data-tab="standings">📈 Scorers</button>
        <button class="nav-tab" data-tab="venues">🏟️ Venues</button>
        <button class="nav-tab" data-tab="news">📰 News</button>
      </div>
    </div>
  </div>
</header>

<div class="status-bar">
  <div>📅 June 18, 2026 | <span class="last-update" id="last-update">Data loaded from cache</span></div>
  <div class="api-status offline" id="api-status"><span>●</span> API: Offline (using cached data)</div>
</div>

<main class="container">
  <div id="dashboard" class="tab-content active">
    <div class="section-title">🔴 Live Matches</div>
    <div class="matches-grid" id="dash-live"></div>
    <div class="section-title" style="margin-top:24px">📅 Upcoming Today</div>
    <div class="matches-grid" id="dash-upcoming"></div>
    <div class="section-title" style="margin-top:24px">✅ Recent Results</div>
    <div class="matches-grid" id="dash-finished"></div>
    <div class="section-title" style="margin-top:24px">📰 Latest News</div>
    <div class="news-grid" id="dash-news"></div>
  </div>

  <div id="matches" class="tab-content">
    <div class="section-title">⚽ All Matches</div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="live">🔴 Live</button>
      <button class="filter-btn" data-filter="upcoming">Upcoming</button>
      <button class="filter-btn" data-filter="finished">Finished</button>
    </div>
    <div class="matches-grid" id="all-matches"></div>
  </div>

  <div id="groups" class="tab-content">
    <div class="section-title">🏆 Group Standings</div>
    <div class="groups-grid" id="all-groups"></div>
  </div>

  <div id="bracket" class="tab-content">
    <div class="section-title">🗳️ Knockout Bracket</div>
    <div class="bracket-wrap"><div class="bracket" id="bracket-box"></div></div>
  </div>

  <div id="standings" class="tab-content">
    <div class="section-title">📈 Top Scorers</div>
    <div id="scorers-box"></div>
  </div>

  <div id="venues" class="tab-content">
    <div class="section-title">🏟️ Host Venues</div>
    <div class="venues-grid" id="all-venues"></div>
  </div>

  <div id="news" class="tab-content">
    <div class="section-title">📰 World Cup News</div>
    <div class="news-grid" id="all-news"></div>
  </div>
</main>

<!-- Bet Slip -->
<button class="bet-slip-toggle" id="bet-slip-toggle" onclick="toggleBetSlip()">🎰</button>
<div class="bet-slip" id="bet-slip">
  <div class="bet-slip-header">
    <div class="bet-slip-title">🎰 Bet Slip <span class="bet-slip-count" id="bet-count">0</span></div>
    <button class="bet-slip-close" onclick="toggleBetSlip()">✕</button>
  </div>
  <div class="bet-slip-items" id="bet-slip-items"></div>
  <div class="bet-slip-footer">
    <input type="number" class="bet-stake-input" id="bet-stake" placeholder="$ Stake" value="10" min="1">
    <div class="bet-potential">Potential Win:<br><span class="bet-potential-amount" id="bet-potential">$0</span></div>
    <button class="place-bet-btn" onclick="placeBets()">Place Bets</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== DATA ====================
var flags = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿",
  "Canada":"🇨🇦","Switzerland":"🇨🇭","Qatar":"🇶🇦","Bosnia and Herzegovina":"🇧🇦",
  "Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "USA":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turkey":"🇹🇷",
  "Germany":"🇩🇪","Curacao":"🇨🇼","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨",
  "Netherlands":"🇳🇱","Japan":"🇯🇵","Tunisia":"🇹🇳","Sweden":"🇸🇪",
  "Belgium":"🇧🇪","Egypt":"🇪🇬","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Spain":"🇪🇸","Cape Verde":"🇨🇻","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾",

// ==================== BETTING ENGINE ====================
var betSlip = [];

function getOdds(home, away) {
  var hRating = teamRatings[home] || 75;
  var aRating = teamRatings[away] || 75;
  var diff = hRating - aRating;

  // Home advantage ~0.3 goals = ~3 rating points
  diff += 3;

  // Moneyline calculation
  var hProb, dProb, aProb;
  if (diff > 15) { hProb = 0.65; dProb = 0.20; aProb = 0.15; }
  else if (diff > 8) { hProb = 0.55; dProb = 0.25; aProb = 0.20; }
  else if (diff > 3) { hProb = 0.48; dProb = 0.28; aProb = 0.24; }
  else if (diff > -3) { hProb = 0.38; dProb = 0.30; aProb = 0.32; }
  else if (diff > -8) { hProb = 0.30; dProb = 0.28; aProb = 0.42; }
  else if (diff > -15) { hProb = 0.22; dProb = 0.25; aProb = 0.53; }
  else { hProb = 0.15; dProb = 0.22; aProb = 0.63; }

  function probToOdds(p) {
    if (p >= 0.5) return Math.round(-100 * p / (1 - p));
    return Math.round(100 * (1 - p) / p);
  }

  var hOdds = probToOdds(hProb);
  var dOdds = probToOdds(dProb);
  var aOdds = probToOdds(aProb);

  // Spread
  var spreadLine = diff > 12 ? -1.5 : diff > 5 ? -0.5 : diff > -5 ? 0 : diff > -12 ? 0.5 : 1.5;
  var spreadOddsH = spreadLine < 0 ? (Math.abs(spreadLine) === 1.5 ? -140 : -110) : (Math.abs(spreadLine) === 1.5 ? 120 : -110);
  var spreadOddsA = spreadLine > 0 ? (Math.abs(spreadLine) === 1.5 ? -140 : -110) : (Math.abs(spreadLine) === 1.5 ? 120 : -110);

  // Total based on combined ratings
  var totalRating = hRating + aRating;
  var totalLine = totalRating > 170 ? 3.5 : totalRating > 155 ? 2.5 : totalRating > 140 ? 2.5 : 1.5;
  var totalOdds = totalLine === 3.5 ? -120 : -110;

  return {
    moneyline: {home: hOdds, draw: dOdds, away: aOdds},
    spread: {home: spreadLine, homeOdds: spreadOddsH, away: -spreadLine, awayOdds: spreadOddsA},
    total: {line: totalLine, over: totalOdds, under: totalOdds}
  };
}

function formatOdds(o) {
  return o > 0 ? '+' + o : o.toString();
}

function formatSpread(line) {
  if (line === 0) return 'PK';
  return line > 0 ? '+' + line : line.toString();
}

function toggleBetSlip() {

function addToBetSlip(betData) {
  var parts = betData.split('|');
  var matchId = parts[0];
  var type = parts[1];
  var pick = parts[2];
  var odds = parseInt(parts[3]);
  var matchName = parts[4];

  var label = '';
  if (type === 'ml') label = pick === 'home' ? matchName.split(' vs ')[0] + ' ML' : pick === 'away' ? matchName.split(' vs ')[1] + ' ML' : 'Draw';
  else if (type === 'sp') label = pick === 'home' ? matchName.split(' vs ')[0] + ' Spread' : matchName.split(' vs ')[1] + ' Spread';
  else if (type === 'tot') {
    var oddsObj = getOdds(matchName.split(' vs ')[0], matchName.split(' vs ')[1]);
    label = pick === 'over' ? 'Over ' + oddsObj.total.line : 'Under ' + oddsObj.total.line;
  }

  var bet = {id: Date.now(), match: matchName, label: label, odds: odds, raw: betData};
  betSlip.push(bet);
  updateBetSlip();
  showToast('Added to bet slip: ' + label + ' (' + formatOdds(odds) + ')', 'success');
  document.getElementById('bet-slip').classList.add('open');
}

function removeBet(id) {
  betSlip = betSlip.filter(function(b) { return b.id !== id; });
  updateBetSlip();
}

function updateBetSlip() {
  var container = document.getElementById('bet-slip-items');
  var count = document.getElementById('bet-count');
  var potential = document.getElementById('bet-potential');
  var stake = parseFloat(document.getElementById('bet-stake').value) || 0;

  count.textContent = betSlip.length;

  if (betSlip.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:#a0a0a0;padding:10px;font-size:0.8rem;">No bets selected. Click odds on any match to add.</div>';
    potential.textContent = '$0';
    return;
  }

  var totalOdds = 1;
  betSlip.forEach(function(b) {
    var o = b.odds;
    totalOdds *= o > 0 ? (o + 100) / 100 : (100 + Math.abs(o)) / Math.abs(o);
  });

  var win = Math.round(stake * totalOdds * 100) / 100;
  potential.textContent = '$' + win.toFixed(2);

  container.innerHTML = betSlip.map(function(b) {
    return '<div class="bet-slip-item">' +
      '<div><div style="font-weight:600">' + b.label + '</div><div style="font-size:0.7rem;color:#a0a0a0">' + b.match + '</div></div>' +
      '<div style="display:flex;align-items:center;gap:10px;"><span style="color:#4caf50;font-weight:700;font-family:monospace;">' + formatOdds(b.odds) + '</span>' +
      '<button class="bet-slip-remove" onclick="removeBet(' + b.id + ')">✕</button></div>' +
      '</div>';
  }).join('');
}

function placeBets() {
  if (betSlip.length === 0) {
    showToast('No bets in your slip!', 'error');
    return;
  }
  showToast('Bets placed! Good luck 🍀 (Mock betting for entertainment)', 'success');
  betSlip = [];
  updateBetSlip();
  document.getElementById('bet-slip').classList.remove('open');
}

  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';

}

// ==================== LIVE DATA FETCH ====================
function refreshData() {
  var btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  // Try to fetch from worldcup26.ir via CORS proxy
  var proxyUrl = 'https://api.allorigins.win/raw?url=';
  var apiUrl = 'https://worldcup26.ir/get/games';

  fetch(proxyUrl + encodeURIComponent(apiUrl))
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data && data.games) {
        updateFromApi(data.games);
        document.getElementById('api-status').className = 'api-status online';
        document.getElementById('api-status').innerHTML = '<span>●</span> API: Live';
        document.getElementById('live-indicator').style.display = 'flex';
        document.getElementById('last-update').textContent = 'Updated just now via API';
        showToast('Live data refreshed!', 'success');
      }
    })
    .catch(function(err) {
      console.log('API fetch failed:', err);
      document.getElementById('api-status').className = 'api-status offline';
      document.getElementById('api-status').innerHTML = '<span>●</span> API: Offline (cached)';
      document.getElementById('live-indicator').style.display = 'none';
      document.getElementById('last-update').textContent = 'Updated from cache — API unavailable';
    })
    .finally(function() {
      btn.classList.remove('spinning');
      renderDash();
      renderAllMatches();
      renderGroups();
    });
}

function updateFromApi(games) {
  games.forEach(function(g) {
    var match = matches.find(function(m) { return m.id === parseInt(g.id); });
    if (match) {
      match.hScore = parseInt(g.home_score) || 0;
      match.aScore = parseInt(g.away_score) || 0;
      if (g.finished === 'TRUE' || g.finished === true) match.status = 'finished';
      else if (g.time_elapsed && g.time_elapsed !== 'notstarted') {
        match.status = 'live';
        match.time = g.time_elapsed + 'min';
      }
      if (g.home_scorers && g.home_scorers !== 'null') match.hScorers = g.home_scorers;
      if (g.away_scorers && g.away_scorers !== 'null') match.aScorers = g.away_scorers;
    }
  });
}

// ==================== EVENT DELEGATION ====================
document.addEventListener('click', function(e) {
  var betRow = e.target.closest('.bet-row');
  if (betRow) {
    var betData = betRow.getAttribute('data-bet');
    if (betData) addToBetSlip(betData);
    return;
  }
});

document.getElementById('bet-stake').addEventListener('input', updateBetSlip);

// ==================== INIT ====================
function init() {
  setupNav();
  setupFilters();
  renderDash();
  renderAllMatches();
  renderGroups();
  renderBracket();
  renderScorers();
  renderVenues();
  renderNews('dash-news', 3);
  renderNews('all-news');
  updateBetSlip();

  // Auto refresh every 60 seconds
  setInterval(refreshData, 60000);

  // Initial refresh attempt
  setTimeout(refreshData, 2000);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
