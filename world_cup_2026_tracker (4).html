<!DOCTYPE html>
<html lang="en">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f0f23;
            color: #f0f0f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 15px 0;
            border-bottom: 3px solid #e94560;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        .logo h1 { font-size: 1.4rem; font-weight: 800; }
        .logo span { color: #e94560; }
        .nav-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .nav-tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.85rem;
            border: none;
        }
        .nav-tab:hover { background: rgba(233,69,96,0.2); color: #fff; }
        .nav-tab.active { background: #e94560; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 25px 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }
        .match-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 18px;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .match-card:hover { transform: translateY(-2px); border-color: rgba(233,69,96,0.4); }
        .match-card.live { border-top: 3px solid #ff4444; }
        .match-card.finished { border-top: 3px solid #4caf50; }
        .match-card.upcoming { border-top: 3px solid #4a90d9; }
        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.8rem;
            color: #a0a0a0;
        }
        .match-status {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .match-status.live { background: rgba(255,68,68,0.2); color: #ff4444; }
        .match-status.finished { background: rgba(76,175,80,0.2); color: #4caf50; }
        .match-status.upcoming { background: rgba(74,144,217,0.2); color: #4a90d9; }
        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .team { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .team-flag { font-size: 2rem; }
        .team-name { font-weight: 600; font-size: 0.9rem; text-align: center; }
        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 70px;
        }
        .score { font-size: 2rem; font-weight: 800; color: #ffd700; }
        .match-time { font-size: 0.8rem; color: #a0a0a0; }
        .match-venue {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.8rem;
            color: #a0a0a0;
        }
        .scorers {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #ccc;
            display: none;
        }
        .scorers.show { display: block; }
        .scorer-row { padding: 2px 0; }
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .group-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
        }
        .group-header {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            padding: 12px 16px;
            font-weight: 700;
            font-size: 1rem;
        }
        .group-table { width: 100%; border-collapse: collapse; }
        .group-table th {
            padding: 10px 8px;
            text-align: center;
            font-size: 0.7rem;
            color: #a0a0a0;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .group-table td {
            padding: 10px 8px;
            text-align: center;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .group-table .team-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            text-align: left;
        }
        .group-table .points { font-weight: 700; color: #ffd700; }
        .group-table tr.qualify { background: rgba(76,175,80,0.05); }
        .group-table tr.qualify td:first-child { border-left: 3px solid #4caf50; }
        .bracket-wrap { overflow-x: auto; padding: 10px 0; }
        .bracket {
            display: flex;
            gap: 30px;
            min-width: 900px;
            justify-content: center;
        }
        .bracket-round { display: flex; flex-direction: column; justify-content: space-around; gap: 15px; }
        .bracket-round-title {
            text-align: center;
            font-size: 0.75rem;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bracket-match {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 12px;
            min-width: 180px;
        }
        .bracket-team { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; }
        .bracket-date { font-size: 0.7rem; color: #a0a0a0; margin-top: 6px; text-align: center; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 6px; }
        .bracket-final { border: 2px solid #ffd700; background: rgba(255,215,0,0.05); }
        .standings-table { width: 100%; background: rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden; }
        .standings-table th { background: #16213e; padding: 12px; text-align: center; font-size: 0.75rem; color: #a0a0a0; text-transform: uppercase; }
        .standings-table td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .standings-table .rank { font-weight: 800; }
        .standings-table .rank-1 { color: #ffd700; }
        .standings-table .rank-2 { color: #c0c0c0; }
        .standings-table .rank-3 { color: #cd7f32; }
        .player-cell { display: flex; align-items: center; gap: 10px; }
        .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #e94560, #ff6b6b); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; }
        .stat-val { font-weight: 700; color: #e94560; }
        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        .venue-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
        }
        .venue-img { height: 150px; background: linear-gradient(135deg, #1a1a2e, #0f3460); display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .venue-info { padding: 16px; }
        .venue-name { font-weight: 700; margin-bottom: 4px; }
        .venue-city { font-size: 0.85rem; color: #a0a0a0; margin-bottom: 8px; }
        .venue-details { display: flex; gap: 12px; font-size: 0.8rem; color: #a0a0a0; }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 15px;
        }
        .news-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            overflow: hidden;
        }
        .news-img { height: 160px; background: linear-gradient(135deg, #16213e, #1a1a2e); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .news-body { padding: 16px; }
        .news-tag { display: inline-block; padding: 3px 10px; background: #e94560; color: #fff; border-radius: 15px; font-size: 0.7rem; font-weight: 600; margin-bottom: 8px; }
        .news-title { font-weight: 700; margin-bottom: 8px; font-size: 1rem; }
        .news-excerpt { font-size: 0.85rem; color: #a0a0a0; line-height: 1.4; margin-bottom: 10px; }
        .news-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: #a0a0a0; }
        .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 14px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #a0a0a0;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .filter-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
        .empty { text-align: center; padding: 50px; color: #a0a0a0; }
        @media (max-width: 768px) {
            .header-content { flex-direction: column; }
            .matches-grid { grid-template-columns: 1fr; }
            .groups-grid { grid-template-columns: 1fr; }
            .bracket { min-width: 700px; }
        }

</head>

        function setupNav() {
            var tabs = document.querySelectorAll('.nav-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].addEventListener('click', function() {
                    var tabId = this.getAttribute('data-tab');
                    var allTabs = document.querySelectorAll('.tab-content');
                    for (var j = 0; j < allTabs.length; j++) {
                        allTabs[j].classList.remove('active');
                    }
                    document.getElementById(tabId).classList.add('active');
                    var allNavs = document.querySelectorAll('.nav-tab');
                    for (var j = 0; j < allNavs.length; j++) {
                        allNavs[j].classList.remove('active');
                    }
                    this.classList.add('active');
                    window.scrollTo(0, 0);
                });
            }
        }

        function setupFilters() {
            var btns = document.querySelectorAll('.filter-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].addEventListener('click', function() {
                    var filter = this.getAttribute('data-filter');
                    currentFilter = filter;
                    var allBtns = document.querySelectorAll('.filter-btn');
                    for (var j = 0; j < allBtns.length; j++) {
                        allBtns[j].classList.remove('active');
                    }
                    this.classList.add('active');
                    renderAllMatches();
                });
            }
        }

        function renderMatchCard(m) {
            var hf = flags[m.home] || "🏳️";
            var af = flags[m.away] || "🏳️";
            var statusClass = m.status;
            var statusText = m.status === "live" ? "🔴 Live" : m.status === "finished" ? "✅ Finished" : "⏳ Upcoming";
            var score = m.status === "upcoming" ? "vs" : m.hScore + " - " + m.aScore;
            var timeDisplay = m.status === "live" ? m.time : m.time;
            var scorersHtml = "";
            if (m.hScorers || m.aScorers) {
                var hGoals = m.hScorers ? m.hScorers.split(", ") : [];
                var aGoals = m.aScorers ? m.aScorers.split(", ") : [];
                var scorerRows = "";
                for (var i = 0; i < hGoals.length; i++) {
                    if (hGoals[i]) scorerRows += '<div class="scorer-row">⚽ ' + m.home + ": " + hGoals[i] + "</div>";
                }
                for (var i = 0; i < aGoals.length; i++) {
                    if (aGoals[i]) scorerRows += '<div class="scorer-row">⚽ ' + m.away + ": " + aGoals[i] + "</div>";
                }
                if (scorerRows) {
                    scorersHtml = '<div class="scorers" id="scorers-' + m.id + '">' + scorerRows + "</div>";
                }
            }
            return '<div class="match-card ' + statusClass + '" data-match-id="' + m.id + '">' +
                '<div class="match-header"><span>Group ' + m.group + " • MD " + m.md + '</span><span class="match-status ' + statusClass + '">' + statusText + "</span></div>" +
                '<div class="match-teams">' +
                '<div class="team"><div class="team-flag">' + hf + '</div><div class="team-name">' + m.home + "</div></div>" +
                '<div class="score-box"><div class="score">' + score + '</div><div class="match-time">' + timeDisplay + "</div></div>" +
                '<div class="team"><div class="team-flag">' + af + '</div><div class="team-name">' + m.away + "</div></div>" +
                "</div>" +
                '<div class="match-venue">🏟️ ' + m.venue + "</div>" +
                scorersHtml +
                "</div>";
        }

        function renderAllMatches() {
            var container = document.getElementById("all-matches");
            var filtered = matches;
            if (currentFilter === "live") filtered = matches.filter(function(m) { return m.status === "live"; });
            else if (currentFilter === "upcoming") filtered = matches.filter(function(m) { return m.status === "upcoming"; });
            else if (currentFilter === "finished") filtered = matches.filter(function(m) { return m.status === "finished"; });
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty">No matches found.</div>';
            } else {
                container.innerHTML = filtered.map(renderMatchCard).join("");
            }
        }

        function renderDashMatches() {
            var container = document.getElementById("dash-matches");
            var live = matches.filter(function(m) { return m.status === "live"; });
            var finished = matches.filter(function(m) { return m.status === "finished"; }).slice(0, 4);
            var upcoming = matches.filter(function(m) { return m.status === "upcoming"; }).slice(0, 4);
            var display = live.concat(upcoming).concat(finished);
            container.innerHTML = display.map(renderMatchCard).join("");
        }

        function renderGroups() {
            var container = document.getElementById("all-groups");
            var html = "";
            for (var g in groups) {
                var teams = groups[g].sort(function(a, b) {
                    return b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga);
                });
                html += '<div class="group-card"><div class="group-header">Group ' + g + "</div>" +
                    '<table class="group-table"><thead><tr><th style="text-align:left">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>';
                for (var i = 0; i < teams.length; i++) {
                    var t = teams[i];
                    var qClass = i < 2 ? "qualify" : "";
                    html += '<tr class="' + qClass + '"><td><div class="team-cell"><span style="font-size:1.1rem">' + (flags[t.team] || "🏳️") + "</span> " + t.team + "</div></td>" +
                        "<td>" + t.p + "</td><td>" + t.w + "</td><td>" + t.d + "</td><td>" + t.l + "</td>" +
                        "<td>" + t.gf + "</td><td>" + t.ga + "</td><td>" + (t.gf - t.ga) + "</td>" +
                        '<td class="points">' + t.pts + "</td></tr>";
                }
                html += "</tbody></table></div>";
            }
            container.innerHTML = html;
        }

        function renderBracket() {
            var rounds = [
                {name:"Round of 32",count:16,date:"June 28 - July 1"},
                {name:"Round of 16",count:8,date:"July 3-5"},
                {name:"Quarter Finals",count:4,date:"July 8-9"},
                {name:"Semi Finals",count:2,date:"July 14-15"},
                {name:"Final",count:1,date:"July 19"}
            ];
            var html = "";
            for (var r = 0; r < rounds.length; r++) {
                var round = rounds[r];
                html += '<div class="bracket-round"><div class="bracket-round-title">' + round.name + "</div>";
                for (var m = 0; m < round.count; m++) {
                    var finalClass = r === rounds.length - 1 ? "bracket-final" : "";
                    html += '<div class="bracket-match ' + finalClass + '"><div class="bracket-team"><span>🏳️ TBD</span><span>-</span></div>' +
                        '<div class="bracket-team"><span>🏳️ TBD</span><span>-</span></div>' +
                        '<div class="bracket-date">' + round.date + "</div></div>";
                }
                html += "</div>";
            }
            document.getElementById("bracket-box").innerHTML = html;
        }

        function renderScorers() {
            var html = '<table class="standings-table"><thead><tr>' +
                '<th style="text-align:left">#</th><th style="text-align:left">Player</th><th>Goals</th><th>Assists</th><th>Matches</th><th>Mins</th>' +
                "</tr></thead><tbody>";
            for (var i = 0; i < scorers.length; i++) {
                var s = scorers[i];
                var rankClass = i === 0 ? "rank-1" : i === 1 ? "rank-2" : i === 2 ? "rank-3" : "";
                html += '<tr><td><span class="rank ' + rankClass + '">' + (i + 1) + "</span></td>" +
                    '<td><div class="player-cell"><div class="player-avatar">' + s.icon + '</div>' +
                    '<div><div style="font-weight:600">' + s.name + '</div><div style="font-size:0.75rem;color:#a0a0a0">' + (flags[s.team] || "🏳️") + " " + s.team + "</div></div></div></td>" +
                    '<td><span class="stat-val">' + s.goals + "</span></td><td>" + s.assists + "</td><td>" + s.mins + "</td><td>" + s.mins + "</td></tr>";
            }
            html += "</tbody></table>";
            document.getElementById("scorers-box").innerHTML = html;
        }

        function renderVenues() {
            document.getElementById("all-venues").innerHTML = venues.map(function(v) {
                return '<div class="venue-card"><div class="venue-img">' + v.icon + '</div>' +

        function renderNews(containerId, limit) {
            var container = document.getElementById(containerId);
            var news = limit ? newsData.slice(0, limit) : newsData;
            container.innerHTML = news.map(function(n) {
                return '<div class="news-card"><div class="news-img">' + n.icon + '</div>' +

                    '<div class="news-excerpt">' + n.excerpt + '</div>' +
                    '<div class="news-meta"><span>📅 ' + n.date + '</span><span>⏰ ' + n.time + '</span></div></div></div>';
            }).join("");
        }

        function setupMatchClicks() {
            document.addEventListener('click', function(e) {
                var card = e.target.closest('.match-card');
                if (card) {
                    var matchId = card.getAttribute('data-match-id');
                    if (matchId) {
                        var el = document.getElementById('scorers-' + matchId);
                        if (el) el.classList.toggle('show');
                    }
                }
            });
        }

        function init() {
            setupNav();
            setupFilters();
            setupMatchClicks();
            renderDashMatches();
            renderAllMatches();
            renderGroups();
            renderBracket();
            renderScorers();
            renderVenues();
            renderNews("dash-news", 3);
            renderNews("all-news");
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
